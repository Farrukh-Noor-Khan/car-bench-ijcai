# Local smoke scenario for the baseline LiteLLM agent under test.
# Runs one train task from each CAR-bench task type.

[evaluator]
endpoint = "http://127.0.0.1:8081"
cmd = "uv run python -m src.evaluator.server --host 127.0.0.1 --port 8081"

[agent_under_test]
endpoint = "http://127.0.0.1:8080"
cmd = "uv run python -m src.track_1_agent_under_test.server --host 127.0.0.1 --port 8080 --agent-llm gemini/gemini-3.5-flash"

[config]
num_trials = 1
task_split = "train"
tasks_base_num_tasks = 1
tasks_hallucination_num_tasks = 1
tasks_disambiguation_num_tasks = 1
max_steps = 50